name: Package skills

on:
  release:
    types: [published]
  workflow_dispatch: {}

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build .skill archives
        run: scripts/package-skills.sh

      - name: Attach to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/*.skill --clobber
